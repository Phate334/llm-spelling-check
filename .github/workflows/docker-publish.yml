name: Publish Docker image

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: Docker image tag to publish
        required: true
        type: string

concurrency:
  group: docker-publish-${{ github.event_name }}-${{ github.ref_name || github.event.inputs.tag }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.platform }} image
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive image coordinates
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.tag }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          image="${GITHUB_REPOSITORY,,}"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "image=${{ env.REGISTRY }}/${image}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.version }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

    outputs:
      image: ${{ steps.vars.outputs.image }}
      version: ${{ steps.vars.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create multi-arch manifest
        shell: bash
        run: |
          docker buildx imagetools create \
            --tag "${{ needs.build.outputs.image }}:${{ needs.build.outputs.version }}" \
            "${{ needs.build.outputs.image }}:${{ needs.build.outputs.version }}-amd64" \
            "${{ needs.build.outputs.image }}:${{ needs.build.outputs.version }}-arm64"

      - name: Inspect published manifest
        shell: bash
        run: |
          docker buildx imagetools inspect \
            "${{ needs.build.outputs.image }}:${{ needs.build.outputs.version }}"