services:
  vllm:
    image: vllm/vllm-openai:v0.21.0
    init: true
    ipc: host
    ports:
      - "8000:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN:?Set HF_TOKEN for gated Hugging Face models}
    volumes:
      - ${HOME}/.cache:/root/.cache
    command: >-
      google/gemma-3-1b-pt
      --served-model-name google/gemma-3-1b-pt
      --host 0.0.0.0
      --language-model-only
      --max-model-len 8192
      --gpu-memory-utilization 0.90
      --enforce-eager
    devices:
      - nvidia.com/gpu=all
