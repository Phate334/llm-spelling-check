services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    ports:
      - "8090:8000"
    environment:
      SPELLING_BASE_URL: ${SPELLING_BASE_URL:-http://host.docker.internal:7072/v1}
      SPELLING_MODEL: ${SPELLING_MODEL:-gemma-4-26b-a4b}
      SPELLING_API_KEY: ${SPELLING_API_KEY:-}
      SPELLING_TIMEOUT: ${SPELLING_TIMEOUT:-30}
    extra_hosts:
      - "host.docker.internal:host-gateway"
