services:
  web:
    image: ghcr.io/phate334/llm-spelling-check:v0.2.5
    init: true
    ports:
      - "8090:8000"
    environment:
      SPELLING_BASE_URL: ${SPELLING_BASE_URL:-http://host.docker.internal:8001/v1}
      SPELLING_MODEL: ${SPELLING_MODEL:-gemma-3-270m}
      SPELLING_API_KEY: ${SPELLING_API_KEY:-}
      SPELLING_TIMEOUT: ${SPELLING_TIMEOUT:-30}
    extra_hosts:
      - "host.docker.internal:host-gateway"
