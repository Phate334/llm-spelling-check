services:
  vllm-cpu:
    image: ghcr.io/phate334/vllm-cpu:v0.22.0
    init: true
    ports:
      - "8001:8000"
    shm_size: "4g"
    environment:
      HF_TOKEN: "${HF_TOKEN:-}"
    volumes:
      - "${HOME}/.cache/huggingface:/root/.cache/huggingface"
    command: >-
      google/gemma-3-270m
      --served-model-name gemma-3-270m
      --host 0.0.0.0
      --language-model-only
      --max-model-len 8192
      --gpu-memory-utilization 0.2
